<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanji Flash Card – Jōyō 2,200</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Kanji Flash Card</h1>
    <div class="top-links">
      <a href="https://github.com/yourusername/kanji-flash-card" target="_blank" aria-label="GitHub repository" class="icon-link">
        <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 012 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
      <a href="https://discord.gg/..." target="_blank" aria-label="Discord server" class="icon-link">
        <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M13.545 2.907a13.227 13.227 0 00-3.257-1.011.05.05 0 00-.052.025c-.141.25-.297.577-.406.833a12.19 12.19 0 00-3.658 0 8.369 8.369 0 00-.411-.833.051.051 0 00-.052-.025 13.22 13.22 0 00-3.257 1.011.05.05 0 00-.021.018C.356 6.024-.213 9.047.066 12.032c.001.014.01.028.02.036a13.21 13.21 0 003.996 2.014.05.05 0 00.056-.019c.308-.42.582-.863.818-1.329a.05.05 0 00-.028-.069 8.69 8.69 0 01-1.248-.595.05.05 0 01-.006-.084c.084-.063.168-.129.248-.195a.05.05 0 01.051-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 01.052.007c.08.066.164.132.248.195a.05.05 0 01-.005.084c-.399.23-.813.435-1.249.595a.05.05 0 00-.027.069c.236.466.51.909.818 1.329a.051.051 0 00.056.019 13.178 13.178 0 004-2.014.05.05 0 00.019-.036c.335-3.451-.559-6.449-2.366-9.106a.05.05 0 00-.02-.018zM5.34 10.207a1.588 1.588 0 01-1.498-1.658A1.578 1.578 0 015.36 6.891c.82 0 1.51.704 1.498 1.658a1.578 1.578 0 01-1.518 1.658zm5.318 0a1.588 1.588 0 01-1.498-1.658 1.578 1.578 0 011.518-1.658c.82 0 1.51.704 1.498 1.658a1.578 1.578 0 01-1.518 1.658z"/></svg>
        Discord
      </a>
    </div>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark/light mode">
      <span class="theme-icon">☀️</span>
    </button>
  </header>

  <main>
    <section class="level-selector">
      <button data-level="N5" class="level-btn active">N5</button>
      <button data-level="N4" class="level-btn">N4</button>
      <button data-level="N3" class="level-btn">N3</button>
      <button data-level="N2" class="level-btn">N2</button>
      <button data-level="N1" class="level-btn">N1</button>
    </section>

    <div class="controls">
      <span id="counter" class="counter">Card 1 of 100</span>
      <button id="shuffleBtn" class="btn" aria-label="Shuffle cards">🔀 Shuffle</button>
      <button id="knownToggleBtn" class="btn" aria-label="Mark as known">✅ Mark Known</button>
      <button id="filterBtn" class="btn" aria-label="Show all">All</button>
    </div>

    <div class="card-container">
      <div class="flashcard" id="flashcard" role="button" tabindex="0" aria-label="Kanji flash card, click to flip">
        <div class="card-inner">
          <div class="card-front">
            <span class="kanji-char" id="kanjiChar">一</span>
          </div>
          <div class="card-back">
            <div class="reading kun"><span class="label">Kun: </span><span id="kunReading"></span></div>
            <div class="reading on"><span class="label">On: </span><span id="onReading"></span></div>
            <div class="meaning"><span class="label">Meaning: </span><span id="meaning"></span></div>
          </div>
        </div>
      </div>
    </div>

    <nav class="nav-buttons">
      <button id="prevBtn" class="btn nav-btn" aria-label="Previous card">← Previous</button>
      <button id="nextBtn" class="btn nav-btn" aria-label="Next card">Next →</button>
    </nav>
  </main>

  <!-- Load all kanji level data -->
  <script src="data/n5.js"></script>
  <script src="data/n4.js"></script>
  <script src="data/n3.js"></script>
  <script src="data/n2.js"></script>
  <script src="data/n1.js"></script>
  <script src="app.js"></script>
</body>
</html>
